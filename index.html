<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies Now Playing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #141414; color: white; }
        h1 { text-align: center; padding: 30px 0; color: #e50914; }
        .card { background-color: #1f1f1f; border: none; transition: transform 0.2s; cursor: pointer; }
        .card:hover { transform: scale(1.05); }
        .card-title { color: white; font-size: 0.95rem; }
        .badge-rating { background-color: #e50914; color: white; padding: 4px 8px; border-radius: 5px; font-size: 0.85rem; }
        .card-img-top { height: 300px; object-fit: cover; }
        #search-input::placeholder {
            color: #aaaaaa;}
        .modal-content { background-color: #1f1f1f; color: white; }
        .modal-header { border-bottom: 1px solid #333; }
        .modal-footer { border-top: 1px solid #333; }
        #modal-poster { width: 150px; border-radius: 8px; }
    </style>
</head>
<body>

    <h1>🎬 Now Playing in Cinemas</h1>
    
    <div class="container mb-4">
        <input type="text" id="search-input" class="form-control mb-3" placeholder="🔍 Search movies..." 
        style="background-color:#1f1f1f; color:#aaaaaa; border:1px solid #333;">
        <div id="genre-filters" class="d-flex gap-2 flex-wrap"></div>
    </div>

    <div class="container">
        <div class="row g-4" id="movies-container"></div>
    </div>

    <div class="container mt-5">
        <h2 style="color:#e50914;">❤️ My Favorites</h2>
        <div class="row g-4" id="favorites-container">
            <p style="color:#aaaaaa;">No favorites yet. Click 🤍 on a movie to add it!</p>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="movieModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-title"></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body d-flex gap-3">
                    <img id="modal-poster" src="" alt="">
                    <div>
                        <p><span class="badge-rating">⭐ <span id="modal-rating"></span></span></p>
                        <p style="color:#aaaaaa;" id="modal-year"></p>
                        <p id="modal-overview"></p>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function loadMovies() {
            const response = await fetch('/movies');
            const movies = await response.json();
            const container = document.getElementById('movies-container');

            movies.forEach(movie => {
                const col = document.createElement('div');
                col.className = 'col-6 col-md-3';
                col.setAttribute('data-genre', movie.genre);
                col.innerHTML = `
                    <div class="card h-100" onclick="openModal(${movie.id}, '${movie.title.replace(/'/g, "\\'")}', '${movie.poster_url}', ${movie.rating}, ${movie.year}, '${movie.overview ? movie.overview.replace(/'/g, "\\'") : "No description available."}')">
                        <img src="${movie.poster_url}" class="card-img-top" alt="${movie.title}">
                        <div class="card-body">
                            <h6 class="card-title">${movie.title}</h6>
                            <span class="badge-rating">⭐ ${movie.rating}</span>
                            <p style="font-size:0.8rem; color:#aaaaaa;">${movie.year}</p>
                            <button class="btn btn-sm fav-btn" data-id="${movie.id}" 
                            onclick="toggleFavorite(${movie.id}, this)" 
                            style="background:none; border:none; font-size:1.2rem; padding:0;">🤍</button>
                            
                        </div>
                    </div>
                `;
                container.appendChild(col);
            });
        }

        function openModal(id, title, poster, rating, year, overview) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-poster').src = poster;
            document.getElementById('modal-rating').textContent = rating;
            document.getElementById('modal-year').textContent = year;
            document.getElementById('modal-overview').textContent = overview;
            new bootstrap.Modal(document.getElementById('movieModal')).show();
        }

        let username = localStorage.getItem('username');
        if (!username) {
            username = prompt('Enter your username:');
            localStorage.setItem('username', username);
        }

        loadMovies();
        loadFavorites();

        async function loadGenres() {
            const response = await fetch('/movies');
            const movies = await response.json();
    
            const genres = [...new Set(movies.map(m => m.genre).filter(Boolean))];
            const container = document.getElementById('genre-filters');
    
            const allBtn = document.createElement('button');
            allBtn.className = 'btn btn-sm btn-danger';
            allBtn.textContent = 'All';
            allBtn.onclick = () => filterGenre('all', allBtn);
            container.appendChild(allBtn);

            genres.forEach(genre => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-sm btn-outline-light';
                btn.textContent = genre;
                btn.onclick = () => filterGenre(genre, btn);
                container.appendChild(btn);
            });
        }

        function filterGenre(genre, clickedBtn) {
            document.querySelectorAll('#genre-filters button').forEach(b => {
                b.className = 'btn btn-sm btn-outline-light';
            });
            clickedBtn.className = 'btn btn-sm btn-danger';

            const cards = document.querySelectorAll('.col-6');
         cards.forEach(card => {
            if (genre === 'all') {
                card.style.display = 'block';
            } else {
                const cardGenre = card.getAttribute('data-genre');
                card.style.display = cardGenre === genre ? 'block' : 'none';
            }
        });
    }

    loadGenres();

    async function loadFavorites() {
        const response = await fetch(`/favorites/${username}`);
        const favorites = await response.json();
        window.favoriteIds = favorites.map(f => f.id);
        updateFavoriteButtons();

        const container = document.getElementById('favorites-container');
        container.innerHTML = '';

        if (favorites.length === 0) {
            container.innerHTML = '<p style="color:#aaaaaa;">No favorites yet. Click 🤍 on a movie to add it!</p>';
            return;}

        favorites.forEach(movie => {
            const col = document.createElement('div');
            col.className = 'col-6 col-md-3';
            col.innerHTML = `
                <div class="card h-100">
                    <img src="${movie.poster_url}" class="card-img-top" alt="${movie.title}">
                    <div class="card-body">
                        <h6 class="card-title">${movie.title}</h6>
                        <span class="badge-rating">⭐ ${movie.rating}</span>
                        <p style="font-size:0.8rem; color:#aaaaaa;">${movie.year}</p>
                    </div>
                </div>
            `;
            container.appendChild(col);
        });
    }

    function updateFavoriteButtons() {
        document.querySelectorAll('.fav-btn').forEach(btn => {
            const movieId = parseInt(btn.getAttribute('data-id'));
            if (window.favoriteIds && window.favoriteIds.includes(movieId)) {
                btn.textContent = '❤️';
                btn.classList.add('active');
            } else {
                btn.textContent = '🤍';
                btn.classList.remove('active');
            }
        });
    }

    async function toggleFavorite(movieId, btn) {
        const isFav = window.favoriteIds && window.favoriteIds.includes(movieId);
    
        if (isFav) {
            await fetch('/favorites', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, movie_id: movieId })
            });
            window.favoriteIds = window.favoriteIds.filter(id => id !== movieId);
        } else {
            await fetch('/favorites', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, movie_id: movieId })
            });
            window.favoriteIds = [...(window.favoriteIds || []), movieId];
        }
        updateFavoriteButtons();
        loadFavorites();
    }

        document.getElementById('search-input').addEventListener('input', function() {
            const search = this.value.toLowerCase();
            const cards = document.querySelectorAll('.col-6');
            cards.forEach(card => {
                const title = card.querySelector('.card-title').textContent.toLowerCase();
                card.style.display = title.includes(search) ? 'block' : 'none';
            });
        });     

    </script>

</body>
</html>
